<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Pricing Card</title>
    <style>
      :root {
        --bg: #0b1220;
        --surface: #0f1a2f;
        --surface-2: #101f3a;
        --text: #e8eefc;
        --muted: #a8b3cf;
        --border: rgba(255, 255, 255, 0.1);
        --shadow: 0 12px 30px rgba(0, 0, 0, 0.35);
        --radius: 16px;
        --accent: #4f8cff;
        --accent-2: #2f6bff;
        --success: #22c55e;
        --focus: 0 0 0 3px rgba(79, 140, 255, 0.35);
      }

      * {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        font-family:
          ui-sans-serif,
          system-ui,
          -apple-system,
          Segoe UI,
          Roboto,
          Helvetica,
          Arial,
          "Apple Color Emoji",
          "Segoe UI Emoji";
        background:
          radial-gradient(
            1200px 600px at 20% -10%,
            rgba(79, 140, 255, 0.25),
            transparent 60%
          ),
          radial-gradient(
            900px 500px at 90% 0%,
            rgba(34, 197, 94, 0.18),
            transparent 55%
          ),
          var(--bg);
        color: var(--text);
        padding: 24px;
        display: grid;
        place-items: center;
        min-height: 100dvh;
      }

      .pricing-card {
        width: min(100%, 420px);
        background: linear-gradient(
          180deg,
          rgba(255, 255, 255, 0.06),
          rgba(255, 255, 255, 0.03)
        );
        border: 1px solid var(--border);
        border-radius: var(--radius);
        box-shadow: var(--shadow);
        padding: 20px;
      }

      .pricing-card__header {
        display: grid;
        gap: 6px;
        margin-bottom: 14px;
      }

      .pricing-card__title {
        margin: 0;
        font-size: clamp(18px, 2.5vw, 22px);
        letter-spacing: 0.2px;
      }

      .pricing-card__price {
        margin: 0;
        display: flex;
        align-items: baseline;
        gap: 8px;
        font-weight: 700;
      }

      .pricing-card__amount {
        font-size: clamp(22px, 4vw, 30px);
        color: var(--success);
      }

      .pricing-card__period {
        font-size: 14px;
        color: var(--muted);
        font-weight: 500;
      }

      .pricing-card__features {
        margin: 14px 0 0;
        padding: 0;
        list-style: none;
        border-top: 1px solid var(--border);
      }

      .pricing-card__features li {
        padding: 10px 0;
        border-bottom: 1px solid var(--border);
        color: var(--text);
      }

      .pricing-card__cta {
        margin-top: 16px;
        width: 100%;
        appearance: none;
        border: 1px solid rgba(79, 140, 255, 0.45);
        background: linear-gradient(180deg, var(--accent), var(--accent-2));
        color: white;
        padding: 12px 14px;
        border-radius: 12px;
        font-weight: 700;
        cursor: pointer;
        transition:
          transform 160ms ease,
          filter 160ms ease,
          box-shadow 160ms ease;
      }

      .pricing-card__cta:hover {
        transform: translateY(-1px);
        filter: brightness(1.02);
      }
      .pricing-card__cta:active {
        transform: translateY(0px);
        filter: brightness(0.98);
      }
      .pricing-card__cta:focus-visible {
        outline: none;
        box-shadow: var(--focus);
      }

      @media (prefers-reduced-motion: reduce) {
        .pricing-card__cta {
          transition: none;
        }
      }
    </style>
  </head>
  <body>
    <article class="pricing-card" aria-label="Basic plan">
      <header class="pricing-card__header">
        <h2 class="pricing-card__title">Basic Plan</h2>
        <p class="pricing-card__price">
          <span class="pricing-card__amount">$9.99</span>
          <span class="pricing-card__period">/ month</span>
        </p>
      </header>

      <ul class="pricing-card__features">
        <li>1 GB Storage</li>
        <li>Basic Support</li>
        <li>All Core Features</li>
      </ul>

      <button class="pricing-card__cta" type="button">Start Trial</button>
    </article>
  </body>
</html>
